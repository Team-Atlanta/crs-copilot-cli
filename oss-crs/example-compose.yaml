##############################################################################
#                        CRS Compose Configuration                           #
#                     Example for crs-copilot-cli                            #
##############################################################################

# --- General Settings -------------------------------------------------------
run_env: local
docker_registry: local

# --- Infrastructure ---------------------------------------------------------
oss_crs_infra:
  cpuset: "0-1"
  memory: "8G"

# --- CRS (crs-copilot-cli) -------------------------------------------------
# Builder sidecar is injected by the framework automatically.
crs-copilot-cli:
  source:
    local_path: /path/to/crs-copilot-cli              # UPDATE: local filesystem path
  cpuset: "2-7"                                        # UPDATE: available CPU cores
  memory: "16G"                                        # UPDATE: available memory
  llm_budget: 10                                       # LLM budget in USD
  additional_env:
    # Override CRS defaults here.
    # Optional prepare-phase CLI pin:
    #   COPILOT_CLI_VERSION: 0.0.411
    # Copilot CLI uses simplified model IDs (not dated snapshots).
    # Available models (set via COPILOT_MODEL):
    #   Anthropic: claude-sonnet-4.5, claude-sonnet-4, claude-sonnet-4.6,
    #              claude-haiku-4.5, claude-opus-4.1, claude-opus-4.5, claude-opus-4.6
    #   OpenAI:    gpt-5, gpt-5-codex, gpt-5.1, gpt-5.1-codex, gpt-5.1-codex-mini,
    #              gpt-5.1-codex-max, gpt-5.2, gpt-5.2-codex, gpt-5.3-codex
    #   Google:    gemini-3-flash, gemini-3-pro
    # Copilot auth token (recommended explicit config):
    #   COPILOT_GITHUB_TOKEN: ghp_xxx
    CRS_AGENT: copilot_cli
    COPILOT_MODEL: gpt-5.3-codex
    COPILOT_GITHUB_TOKEN: ${COPILOT_GITHUB_TOKEN}
    # COPILOT_SUBSCRIPTION_TOKEN: ${COPILOT_SUBSCRIPTION_TOKEN}  # Compatibility alias
    # AGENT_TIMEOUT: "3600"                            # Optional: seconds, 0 = no limit (default)

# --- Optional LLM Configuration --------------------------------------------
# Copilot CLI normally uses GitHub-native authentication via COPILOT_GITHUB_TOKEN.
# Uncomment only if you want OSS-CRS to validate/inject a framework-level external
# LiteLLM endpoint; Copilot CLI does not consume OSS_CRS_LLM_API_URL /
# OSS_CRS_LLM_API_KEY directly today.
# llm_config:
#   litellm:
#     mode: external
#     external:
#       url_env: EXTERNAL_LITELLM_API_BASE
#       key_env: EXTERNAL_LITELLM_API_KEY
